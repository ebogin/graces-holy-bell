<!DOCTYPE html>
<!--
  Grace's Holy Bell — waitlist signup form.
  Public page, deployed at https://boginfactory.com/grace-waitlist.html

  Styling mirrors graces-privacy-policy.html (the app's LCD-green theme).

  SETUP: set WORKER_ENDPOINT below to your deployed Cloudflare Worker URL.
  See ../waitlist/SETUP.md for the full backend walkthrough.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Waitlist — Grace's Holy Bell</title>
  <meta name="description" content="Join the waiting list for Grace's Holy Bell.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --lcd-bg-light: #d4e4bc;
      --lcd-bg-dark:  #c4d4ac;
      --lcd-surface:  #c0d0a8;
      --lcd-inner:    #c8d8b0;
      --lcd-border:   #a0b080;
      --lcd-slider:   #8aaa6a;
      --lcd-dark:     #1a2a0a;
      --lcd-mid:      #4a6a3a;
      --lcd-title:    #5f7c4d;
      --lcd-on-dark:  #c8d8b0;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; min-height: 100%; }

    body {
      font-family: "Press Start 2P", monospace;
      background: linear-gradient(135deg, var(--lcd-bg-light), var(--lcd-bg-dark));
      background-attachment: fixed;
      color: var(--lcd-dark);
      line-height: 1.9;
      -webkit-font-smoothing: none;
      padding: 32px 20px 64px;
    }

    .card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--lcd-surface);
      border: 4px solid var(--lcd-border);
      border-radius: 10px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 18px;
      line-height: 1.6;
      color: var(--lcd-dark);
      margin: 0 0 16px;
    }

    .intro {
      font-size: 10px;
      color: var(--lcd-mid);
      line-height: 1.9;
      margin: 0 0 28px;
    }

    label {
      display: block;
      font-size: 9px;
      color: var(--lcd-title);
      margin: 0 0 8px;
    }

    .field { margin: 0 0 22px; }

    input, select {
      width: 100%;
      font-family: "Press Start 2P", monospace;
      font-size: 11px;
      color: var(--lcd-dark);
      background: var(--lcd-inner);
      border: 2px solid var(--lcd-border);
      border-radius: 4px;
      padding: 12px 10px;
      -webkit-font-smoothing: none;
    }

    /* The country dropdown carries flag emoji, so let the system font render
       those glyphs while the rest of the page keeps the pixel font. */
    select {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--lcd-slider);
    }

    /* SMS-authorization checkbox row. */
    .check-field {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 0 0 22px;
    }

    .check-field input[type="checkbox"] {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      margin: 0;
      accent-color: var(--lcd-slider);
      cursor: pointer;
    }

    .check-field label {
      margin: 0;
      font-size: 8px;
      line-height: 1.9;
      color: var(--lcd-mid);
      cursor: pointer;
    }

    button {
      width: 100%;
      font-family: "Press Start 2P", monospace;
      font-size: 12px;
      color: var(--lcd-on-dark);
      background: var(--lcd-slider);
      border: 2px solid var(--lcd-dark);
      border-radius: 4px;
      padding: 14px 10px;
      margin-top: 8px;
      cursor: pointer;
      -webkit-font-smoothing: none;
    }

    button:disabled { opacity: 0.5; cursor: default; }

    .status {
      font-size: 9px;
      color: var(--lcd-mid);
      line-height: 1.8;
      margin: 16px 0 0;
      min-height: 1.2em;
      text-align: center;
    }

    .status.error { color: #7a2a2a; }

    .footer {
      max-width: 560px;
      margin: 24px auto 0;
      text-align: center;
      font-size: 8px;
      color: var(--lcd-mid);
      line-height: 1.8;
    }

    .footer a { color: var(--lcd-title); }

    @media (max-width: 480px) {
      body { padding: 20px 12px 48px; }
      .card { padding: 24px 18px; }
      h1 { font-size: 15px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>JOIN THE<br>WAITLIST</h1>
    <p class="intro">
      Grace's Holy Bell is in beta. Leave your details and we'll reach out when
      it's released.
    </p>

    <form id="waitlist-form" novalidate>
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" inputmode="email">
      </div>
      <div class="field">
        <label for="country">Country</label>
        <select id="country" name="country" autocomplete="country-name">
          <option value="">Select your country…</option>
        </select>
      </div>
      <div class="field">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" autocomplete="tel" inputmode="tel">
      </div>

      <div class="check-field">
        <input type="checkbox" id="sms-consent" name="sms-consent">
        <label for="sms-consent">
          I authorize Grace's Holy Bell to send me SMS text messages about the
          app. Message &amp; data rates may apply.
        </label>
      </div>

      <!-- Honeypot: hidden from people, tempting to bots. Leave blank. -->
      <input type="text" id="website" name="website" tabindex="-1" autocomplete="off"
             aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;">

      <button type="submit" id="submit-btn">JOIN THE LIST</button>
      <p class="status" id="status"></p>
    </form>
  </main>

  <p class="footer">
    Grace's Holy Bell &middot; Boginfactory &middot;
    <a href="graces-privacy-policy.html">Privacy Policy</a>
  </p>

  <script>
    // ── CONFIG ───────────────────────────────────────────────────────────
    // Set this to your deployed Cloudflare Worker URL. See waitlist/SETUP.md.
    const WORKER_ENDPOINT = "https://grace-waitlist.grace-waitlist.workers.dev";
    // ─────────────────────────────────────────────────────────────────────

    // Referrer code from the QR / shared link (?ref=...). May be empty.
    const referrer = new URLSearchParams(location.search).get("ref") || "";

    // ── Country dropdown ──────────────────────────────────────────────────
    // Standard ISO 3166 country list with calling codes. Flags are rendered as
    // emoji derived from the two-letter code (no image assets needed).
    const COUNTRIES = [
      ["Afghanistan","AF","93"],["Albania","AL","355"],["Algeria","DZ","213"],
      ["Andorra","AD","376"],["Angola","AO","244"],["Argentina","AR","54"],
      ["Armenia","AM","374"],["Australia","AU","61"],["Austria","AT","43"],
      ["Azerbaijan","AZ","994"],["Bahamas","BS","1"],["Bahrain","BH","973"],
      ["Bangladesh","BD","880"],["Barbados","BB","1"],["Belarus","BY","375"],
      ["Belgium","BE","32"],["Belize","BZ","501"],["Benin","BJ","229"],
      ["Bhutan","BT","975"],["Bolivia","BO","591"],["Bosnia & Herzegovina","BA","387"],
      ["Botswana","BW","267"],["Brazil","BR","55"],["Brunei","BN","673"],
      ["Bulgaria","BG","359"],["Burkina Faso","BF","226"],["Burundi","BI","257"],
      ["Cambodia","KH","855"],["Cameroon","CM","237"],["Canada","CA","1"],
      ["Cape Verde","CV","238"],["Chad","TD","235"],["Chile","CL","56"],
      ["China","CN","86"],["Colombia","CO","57"],["Comoros","KM","269"],
      ["Congo","CG","242"],["Costa Rica","CR","506"],["Croatia","HR","385"],
      ["Cuba","CU","53"],["Cyprus","CY","357"],["Czechia","CZ","420"],
      ["Denmark","DK","45"],["Djibouti","DJ","253"],["Dominica","DM","1"],
      ["Dominican Republic","DO","1"],["Ecuador","EC","593"],["Egypt","EG","20"],
      ["El Salvador","SV","503"],["Estonia","EE","372"],["Eswatini","SZ","268"],
      ["Ethiopia","ET","251"],["Fiji","FJ","679"],["Finland","FI","358"],
      ["France","FR","33"],["Gabon","GA","241"],["Gambia","GM","220"],
      ["Georgia","GE","995"],["Germany","DE","49"],["Ghana","GH","233"],
      ["Greece","GR","30"],["Grenada","GD","1"],["Guatemala","GT","502"],
      ["Guinea","GN","224"],["Guyana","GY","592"],["Haiti","HT","509"],
      ["Honduras","HN","504"],["Hong Kong","HK","852"],["Hungary","HU","36"],
      ["Iceland","IS","354"],["India","IN","91"],["Indonesia","ID","62"],
      ["Iran","IR","98"],["Iraq","IQ","964"],["Ireland","IE","353"],
      ["Israel","IL","972"],["Italy","IT","39"],["Jamaica","JM","1"],
      ["Japan","JP","81"],["Jordan","JO","962"],["Kazakhstan","KZ","7"],
      ["Kenya","KE","254"],["Kuwait","KW","965"],["Kyrgyzstan","KG","996"],
      ["Laos","LA","856"],["Latvia","LV","371"],["Lebanon","LB","961"],
      ["Lesotho","LS","266"],["Liberia","LR","231"],["Libya","LY","218"],
      ["Liechtenstein","LI","423"],["Lithuania","LT","370"],["Luxembourg","LU","352"],
      ["Macau","MO","853"],["Madagascar","MG","261"],["Malawi","MW","265"],
      ["Malaysia","MY","60"],["Maldives","MV","960"],["Mali","ML","223"],
      ["Malta","MT","356"],["Mauritania","MR","222"],["Mauritius","MU","230"],
      ["Mexico","MX","52"],["Moldova","MD","373"],["Monaco","MC","377"],
      ["Mongolia","MN","976"],["Montenegro","ME","382"],["Morocco","MA","212"],
      ["Mozambique","MZ","258"],["Myanmar","MM","95"],["Namibia","NA","264"],
      ["Nepal","NP","977"],["Netherlands","NL","31"],["New Zealand","NZ","64"],
      ["Nicaragua","NI","505"],["Niger","NE","227"],["Nigeria","NG","234"],
      ["North Korea","KP","850"],["North Macedonia","MK","389"],["Norway","NO","47"],
      ["Oman","OM","968"],["Pakistan","PK","92"],["Panama","PA","507"],
      ["Papua New Guinea","PG","675"],["Paraguay","PY","595"],["Peru","PE","51"],
      ["Philippines","PH","63"],["Poland","PL","48"],["Portugal","PT","351"],
      ["Qatar","QA","974"],["Romania","RO","40"],["Russia","RU","7"],
      ["Rwanda","RW","250"],["Saudi Arabia","SA","966"],["Senegal","SN","221"],
      ["Serbia","RS","381"],["Seychelles","SC","248"],["Sierra Leone","SL","232"],
      ["Singapore","SG","65"],["Slovakia","SK","421"],["Slovenia","SI","386"],
      ["Somalia","SO","252"],["South Africa","ZA","27"],["South Korea","KR","82"],
      ["South Sudan","SS","211"],["Spain","ES","34"],["Sri Lanka","LK","94"],
      ["Sudan","SD","249"],["Suriname","SR","597"],["Sweden","SE","46"],
      ["Switzerland","CH","41"],["Syria","SY","963"],["Taiwan","TW","886"],
      ["Tajikistan","TJ","992"],["Tanzania","TZ","255"],["Thailand","TH","66"],
      ["Togo","TG","228"],["Trinidad & Tobago","TT","1"],["Tunisia","TN","216"],
      ["Turkey","TR","90"],["Turkmenistan","TM","993"],["Uganda","UG","256"],
      ["Ukraine","UA","380"],["United Arab Emirates","AE","971"],
      ["United Kingdom","GB","44"],["United States","US","1"],["Uruguay","UY","598"],
      ["Uzbekistan","UZ","998"],["Venezuela","VE","58"],["Vietnam","VN","84"],
      ["Yemen","YE","967"],["Zambia","ZM","260"],["Zimbabwe","ZW","263"],
    ];

    function flagEmoji(iso2) {
      return iso2.toUpperCase().replace(/./g, (c) =>
        String.fromCodePoint(127397 + c.charCodeAt(0))
      );
    }

    const countrySelect = document.getElementById("country");
    for (const [name, iso2, dial] of COUNTRIES) {
      const opt = document.createElement("option");
      // Stored value stays plain text (no emoji) so the CSV reads cleanly.
      opt.value = name + " (+" + dial + ")";
      opt.textContent = flagEmoji(iso2) + "  " + name + " (+" + dial + ")";
      countrySelect.appendChild(opt);
    }

    // Mint THIS submitter's own referral code client-side, so their thank-you
    // page and confirmation email can carry a share link without any extra
    // backend round-trip.
    function newCode() {
      const alphabet = "abcdefghjkmnpqrstuvwxyz23456789";
      let code = "";
      const rnd = new Uint32Array(8);
      crypto.getRandomValues(rnd);
      for (let i = 0; i < 8; i++) code += alphabet[rnd[i] % alphabet.length];
      return code;
    }
    const myCode = newCode();

    const form = document.getElementById("waitlist-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");

    // Light phone check: ignore spaces, dashes, parens, and a leading +; what's
    // left should be 7–15 digits (the E.164 range). Deliberately permissive.
    function looksLikePhone(value) {
      const digits = value.replace(/[\s\-().]/g, "").replace(/^\+/, "");
      return /^[0-9]{7,15}$/.test(digits);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const phone = document.getElementById("phone").value.trim();
      const smsConsent = document.getElementById("sms-consent").checked;

      // Validate phone only when one was entered (the field stays optional).
      if (phone && !looksLikePhone(phone)) {
        statusEl.className = "status error";
        statusEl.textContent = "Please enter a valid phone number.";
        return;
      }
      // Can't authorize SMS without a number to text.
      if (smsConsent && !looksLikePhone(phone)) {
        statusEl.className = "status error";
        statusEl.textContent = "Add a valid phone number to receive SMS updates.";
        return;
      }

      statusEl.className = "status";
      statusEl.textContent = "Sending…";
      submitBtn.disabled = true;

      const payload = {
        email:      document.getElementById("email").value.trim(),
        name:       document.getElementById("name").value.trim(),
        country:    document.getElementById("country").value.trim(),
        phone:      phone,
        smsConsent: smsConsent,
        referrer:   referrer,
        myCode:     myCode,
        website:    document.getElementById("website").value.trim(), // honeypot
      };

      try {
        const res = await fetch(WORKER_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error("Request failed: " + res.status);
        // Success — hand off to the thank-you page with this submitter's code.
        location.href = "grace-waitlist-thanks.html?ref=" + encodeURIComponent(myCode);
      } catch (err) {
        statusEl.className = "status error";
        statusEl.textContent = "Something went wrong. Please try again.";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
