appId: Boginfactory.Graces-Holy-Bell
---
# Open and close the settings panel from the idle screen.
# Verifies the settings panel slides in and out, and the Stage 5 row changes.

- launchApp:
    clearState: true

# Tap gear icon to open settings
- tapOn:
    id: "settings-button"

# Settings panel should be visible
- assertVisible:
    text: "SETTINGS"

# Stage 5: the retired "Save Log to Notes" row is gone.
# (The replacement "Force Watch Sync" row is present but its green Sync pill is
# disabled/grayed in the Simulator — no paired Watch with the app installed — so
# the disabled SwiftUI Button drops from the a11y tree and can't be asserted
# here. Its enabled/tappable state is covered on real devices, §3 group H +
# scenario 14.)
- assertNotVisible:
    text: "Save Log to Notes"

# Tap outside to dismiss (tap upper portion of screen)
- tapOn:
    point: "50%, 20%"

# Welcome text should be back
- assertVisible:
    text: "SLIDE TO BEGIN"
